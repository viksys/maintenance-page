<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikasana Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@800&family=Barlow:wght@300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --mono:'Share Tech Mono',monospace;
  --display:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --dim:rgba(255,255,255,0.08);
  --mid:rgba(255,255,255,0.18);
  --text:#585858;
}

html,body{height:100%;overflow:hidden;}

body{
  background:#000;
  color:#fff;
  cursor:crosshair;
  display:flex;
  flex-direction:column;
}

/* scanlines */
body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;z-index:999;
}

/* grid */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}

/* TOP BAR */
.topbar{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;height:52px;
  border-bottom:1px solid var(--dim);
}

.brand{
  font-family:var(--display);font-weight:800;
  font-size:15px;letter-spacing:0.1em;
  color:#fff;text-transform:uppercase;text-decoration:none;
}

.top-right{
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.16em;color:var(--text);
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}

.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25);animation:blink 2.4s ease-in-out infinite;}

/* MAIN — centered */
main{
  flex:1;position:relative;z-index:5;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 24px;text-align:center;
}

/* coord lines — thin crosshair centered */
.crosshair-h,.crosshair-v{
  position:absolute;pointer-events:none;
  background:rgba(255,255,255,0.04);
}
.crosshair-h{left:0;right:0;height:1px;top:50%;}
.crosshair-v{top:0;bottom:0;width:1px;left:50%;}

/* corner brackets */
.bracket{
  position:absolute;width:20px;height:20px;pointer-events:none;
}
.bracket.tl{top:24px;left:24px;border-top:1px solid var(--mid);border-left:1px solid var(--mid);}
.bracket.tr{top:24px;right:24px;border-top:1px solid var(--mid);border-right:1px solid var(--mid);}
.bracket.bl{bottom:24px;left:24px;border-bottom:1px solid var(--mid);border-left:1px solid var(--mid);}
.bracket.br{bottom:24px;right:24px;border-bottom:1px solid var(--mid);border-right:1px solid var(--mid);}

/* label above */
.above-label{
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.28em;color:var(--text);
  text-transform:uppercase;margin-bottom:32px;
  opacity:0;animation:fadeIn 0.6s ease 0.3s forwards;
}

/* MEGA TITLE */
.mega{
  font-family:var(--display);font-weight:800;
  font-size:clamp(80px,15vw,200px);
  line-height:1;letter-spacing:-0.02em;
  text-transform:uppercase;
  color:#fff;
  position:relative;
  opacity:0;animation:fadeIn 0.5s ease 0.5s forwards;
}

/* glitch */
.mega::before,.mega::after{
  content:attr(data-text);
  position:absolute;inset:0;
  font-family:inherit;font-weight:inherit;
  font-size:inherit;line-height:inherit;
  letter-spacing:inherit;text-transform:inherit;
  overflow:hidden;
}
.mega::before{
  color:rgba(255,255,255,0.4);
  clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);
  animation:glitch1 6s infinite;
  left:2px;
}
.mega::after{
  color:rgba(255,255,255,0.15);
  clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%);
  animation:glitch2 7s infinite;
  left:-2px;
}

/* sub line */
.sub-row{
  display:flex;align-items:center;gap:20px;
  margin-top:28px;justify-content:center;
  opacity:0;animation:fadeIn 0.6s ease 0.7s forwards;
}
.sub-line{width:48px;height:1px;background:rgba(255,255,255,0.15);}
.sub-text{
  font-family:var(--mono);font-size:11px;
  letter-spacing:0.22em;color:rgba(255,255,255,0.3);
  text-transform:uppercase;
}

/* contact pill */
.contact-wrap{
  margin-top:52px;
  opacity:0;animation:fadeIn 0.6s ease 0.9s forwards;
}
.contact-link{
  font-family:var(--mono);font-size:12px;
  letter-spacing:0.14em;color:rgba(255,255,255,0.35);
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.1);
  padding:12px 28px;
  display:inline-block;
  transition:color 0.25s,border-color 0.25s;
  text-transform:lowercase;
}
.contact-link:hover{color:#fff;border-color:rgba(255,255,255,0.4);}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

@keyframes glitch1{
  0%,94%,100%{transform:translate(0);opacity:0;}
  95%{transform:translate(-3px,1px);opacity:1;}
  97%{transform:translate(3px,-1px);opacity:1;}
  99%{transform:translate(-1px,0);opacity:0.5;}
}
@keyframes glitch2{
  0%,91%,100%{transform:translate(0);opacity:0;}
  92%{transform:translate(3px,2px);opacity:1;}
  94%{transform:translate(-3px,-1px);opacity:1;}
  96%{transform:translate(1px,0);opacity:0.4;}
}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.1;}}

/* RESPONSIVE */
@media(max-width:600px){
  .topbar{padding:0 20px;}
  .mega{font-size:clamp(64px,20vw,100px);}
  .contact-link{font-size:10px;padding:10px 20px;letter-spacing:0.1em;}
  .bracket{width:14px;height:14px;}
  .sub-text{font-size:9px;letter-spacing:0.16em;}
}
</style>
</head>
<body>

<!-- TOP -->
<div class="topbar">
  <a class="brand" href="#">Vikasana Systems</a>
  <div class="top-right"><div class="dot"></div>System Standby</div>
</div>

<!-- MAIN -->
<main>
  <div class="crosshair-h"></div>
  <div class="crosshair-v"></div>
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="above-label">Vikasana Systems </div>

  <div class="mega" data-text="Coming Soon">Coming Soon</div>

  <div class="sub-row">
    <div class="sub-line"></div>
    <div class="sub-text">Preparing for Deployment</div>
    <div class="sub-line"></div>
  </div>

  <div class="contact-wrap">
    <a class="contact-link" href="mailto:info@vikasanasystems.tech">info@vikasanasystems.tech</a>
  </div>
</main>



</body>
</html>
